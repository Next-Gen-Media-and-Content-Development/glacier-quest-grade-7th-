<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLACIER QUEST — OMNI-GRID Universe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

:root {
  --ice-cyan: #00e5ff;
  --ice-blue: #0077b6;
  --deep-space: #010814;
  --nebula-blue: #071830;
  --crystal: rgba(0,220,255,0.15);
  --glow: rgba(0,200,255,0.6);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--deep-space);
  font-family: 'Exo 2', sans-serif;
  overflow: hidden; height: 100vh; width: 100vw;
  cursor: default;
}

/* ── CANVAS LAYERS ── */
#bg-canvas { position:fixed; inset:0; z-index:0; }
#trail-canvas { position:fixed; inset:0; z-index:4; pointer-events:none; }
#penguin-canvas { position:fixed; inset:0; z-index:5; pointer-events:none; }

/* ── SCENE CONTAINER ── */
.scene {
  position: relative; z-index: 2;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}

/* ── NEBULA OVERLAY ── */
.nebula {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 40% at 15% 20%, rgba(0,60,120,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 85% 15%, rgba(0,100,180,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 50% 80%, rgba(0,30,80,0.5) 0%, transparent 70%),
    radial-gradient(ellipse 90% 50% at 50% 50%, rgba(0,20,50,0.3) 0%, transparent 80%);
  animation: nebulaPulse 12s ease-in-out infinite alternate;
}
@keyframes nebulaPulse {
  0% { opacity:0.7; }
  100% { opacity:1; filter:brightness(1.15); }
}

/* ── GLACIERS (SVG-based positioned divs) ── */
.glaciers-layer {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 55vh; pointer-events: none; z-index: 3;
}

/* ── HERO TEXT BLOCK ── */
.hero {
  position: relative; z-index: 10;
  text-align: center;
  padding: 0 1rem;
  margin-top: -6vh;
}

.omni-badge {
  display: inline-block;
  font-family: 'Exo 2', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 4px;
  color: rgba(0,200,255,0.7);
  border: 1px solid rgba(0,200,255,0.25);
  background: rgba(0,30,70,0.5);
  backdrop-filter: blur(8px);
  padding: 5px 20px; border-radius: 20px;
  margin-bottom: 18px;
  text-transform: uppercase;
}

/* ICE-CARVED TITLE */
.glacier-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(3.5rem, 9vw, 7rem);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: 4px;
  margin-bottom: 4px;
  position: relative;
  display: inline-block;
}

/* Carved ice layers */
.glacier-title .ice-layer {
  position: relative;
  display: block;
  background: linear-gradient(
    170deg,
    #ffffff 0%,
    #c8f0ff 15%,
    #7adeff 30%,
    #00c8ff 50%,
    #0095e8 68%,
    #004fa3 82%,
    #001e5c 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 18px rgba(0,180,255,0.55))
          drop-shadow(0 0 50px rgba(0,140,255,0.3));
}

/* Engraving: offset dark echo */
.glacier-title .ice-engrave {
  position: absolute; top: 3px; left: 2px;
  display: block; width: 100%;
  font-family: 'Cinzel', serif;
  font-size: inherit; font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(170deg, rgba(0,60,120,0.5) 0%, rgba(0,20,60,0.7) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: blur(2px);
  z-index: -1;
  user-select: none;
}

/* Crystal fracture lines across title */
.glacier-title::after {
  content: '';
  position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 80%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,220,255,0.6), rgba(0,220,255,1), rgba(0,220,255,0.6), transparent);
  box-shadow: 0 0 12px rgba(0,220,255,0.8);
}

.ice-divider {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin: 10px auto 10px;
}
.ice-divider span {
  display: block; height: 1px; border-radius: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,200,255,0.6), transparent);
}
.ice-divider .diamond {
  width: 6px; height: 6px; background: var(--ice-cyan);
  transform: rotate(45deg);
  box-shadow: 0 0 8px var(--ice-cyan);
  flex-shrink: 0;
}

.hero-sub {
  font-family: 'Exo 2', sans-serif;
  font-size: 12px; font-weight: 300; letter-spacing: 5px;
  color: rgba(0,200,255,0.65);
  text-transform: uppercase; margin-bottom: 12px;
}

.hero-desc {
  font-size: 0.9rem; color: rgba(120,190,230,0.7);
  max-width: 440px; margin: 0 auto 26px;
  line-height: 1.65; font-weight: 300;
}

/* ENTER EXPEDITION BUTTON */
.enter-btn {
  position: relative; display: inline-flex;
  align-items: center; gap: 12px;
  font-family: 'Exo 2', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; color: var(--ice-cyan);
  padding: 14px 44px;
  border: none; cursor: pointer;
  background: transparent;
  overflow: hidden;
}

.enter-btn::before {
  content: '';
  position: absolute; inset: 0;
  border: 1px solid rgba(0,200,255,0.45);
  background: linear-gradient(135deg,
    rgba(0,60,120,0.55) 0%,
    rgba(0,100,180,0.25) 50%,
    rgba(0,40,90,0.55) 100%);
  backdrop-filter: blur(12px);
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  transition: all 0.35s;
}

.enter-btn::after {
  content: '';
  position: absolute; inset: -1px;
  background: linear-gradient(135deg, rgba(0,200,255,0.2), transparent 50%, rgba(0,200,255,0.1));
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  opacity: 0; transition: opacity 0.35s;
}

.enter-btn:hover::before {
  border-color: rgba(0,220,255,0.8);
  box-shadow: 0 0 30px rgba(0,200,255,0.25), inset 0 0 20px rgba(0,200,255,0.08);
}
.enter-btn:hover::after { opacity: 1; }
.enter-btn:hover { color: #fff; }
.enter-btn:active { transform: scale(0.98); }

.btn-text { position: relative; z-index: 1; }
.btn-arrow { position: relative; z-index: 1; font-size: 1.1rem; transition: transform 0.3s; }
.enter-btn:hover .btn-arrow { transform: translateX(5px); }

/* Corner accents on button */
.btn-corner {
  position: absolute; width: 8px; height: 8px;
  border-color: var(--ice-cyan); z-index:2;
}
.btn-corner.tl { top:-1px; left:8px; border-top:1px solid; border-left:1px solid; }
.btn-corner.tr { top:-1px; right:8px; border-top:1px solid; border-right:1px solid; }
.btn-corner.bl { bottom:-1px; left:8px; border-bottom:1px solid; border-left:1px solid; }
.btn-corner.br { bottom:-1px; right:8px; border-bottom:1px solid; border-right:1px solid; }

/* ── GUARDIANS ── */
.guardian {
  position: absolute; bottom: 18vh; z-index: 6;
  animation: guardianFloat 5s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(0,180,255,0.5));
}
.guardian.left { left: 3vw; }
.guardian.right { right: 3vw; animation-delay: -2.5s; }
@keyframes guardianFloat {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-14px); }
}

/* Pulsating core on guardians */
@keyframes corePulse {
  0%,100% { opacity: 0.6; r: 8; }
  50% { opacity: 1; r: 11; }
}

/* ── FAR PENGUINS (atop guardians) ── */
.side-penguin {
  position: absolute; z-index: 7;
  bottom: calc(18vh + 148px);
  animation: waddle 1.8s ease-in-out infinite;
}
.side-penguin.left { left: calc(3vw + 28px); }
.side-penguin.right { right: calc(3vw + 28px); animation-delay: -0.9s; }
@keyframes waddle {
  0%,100% { transform: rotate(-6deg); }
  25% { transform: rotate(6deg) translateY(-3px); }
  50% { transform: rotate(-4deg); }
  75% { transform: rotate(5deg) translateY(-2px); }
}

/* ── SCAN LINES (subtle) ── */
.scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 20;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,10,30,0.04) 2px, rgba(0,10,30,0.04) 4px
  );
}

/* ── VIGNETTE ── */
.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 19;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 40%, rgba(0,5,15,0.7) 100%);
}

/* ── ENTRY ANIMATION ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to { opacity:1; transform:translateY(0); }
}
.omni-badge { animation: fadeUp 0.8s ease 0.2s both; }
.glacier-title { animation: fadeUp 1s ease 0.45s both; }
.ice-divider { animation: fadeUp 0.7s ease 0.75s both; }
.hero-sub { animation: fadeUp 0.7s ease 0.85s both; }
.hero-desc { animation: fadeUp 0.7s ease 1s both; }
.enter-btn { animation: fadeUp 0.8s ease 1.15s both; }
.guardian { animation: guardianFloat 5s ease-in-out infinite, fadeUp 1s ease 0.6s both; }
</style>
</head>
<body>

<!-- Background star/nebula canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Trail canvas (behind penguins) -->
<canvas id="trail-canvas"></canvas>

<!-- Moving penguin canvas -->
<canvas id="penguin-canvas"></canvas>

<div class="scanlines"></div>
<div class="vignette"></div>

<div class="scene">
  <div class="nebula"></div>

  <!-- GLACIERS SVG LAYER -->
  <div class="glaciers-layer">
    <svg width="100%" height="100%" viewBox="0 0 1400 500" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Deep ice gradient (main blocks) -->
        <linearGradient id="iceL1" x1="0%" y1="0%" x2="60%" y2="100%">
          <stop offset="0%" stop-color="#c8f0ff" stop-opacity="0.75"/>
          <stop offset="20%" stop-color="#7ad4f0" stop-opacity="0.55"/>
          <stop offset="50%" stop-color="#2090cc" stop-opacity="0.45"/>
          <stop offset="80%" stop-color="#0050a0" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#001840" stop-opacity="0.9"/>
        </linearGradient>
        <linearGradient id="iceL2" x1="100%" y1="0%" x2="30%" y2="100%">
          <stop offset="0%" stop-color="#b0e8ff" stop-opacity="0.7"/>
          <stop offset="25%" stop-color="#60c0f0" stop-opacity="0.5"/>
          <stop offset="55%" stop-color="#1880cc" stop-opacity="0.45"/>
          <stop offset="85%" stop-color="#003888" stop-opacity="0.65"/>
          <stop offset="100%" stop-color="#001030" stop-opacity="0.95"/>
        </linearGradient>
        <linearGradient id="iceCenter" x1="30%" y1="0%" x2="70%" y2="100%">
          <stop offset="0%" stop-color="#e0f8ff" stop-opacity="0.8"/>
          <stop offset="15%" stop-color="#90dcf8" stop-opacity="0.6"/>
          <stop offset="45%" stop-color="#38a8e8" stop-opacity="0.5"/>
          <stop offset="75%" stop-color="#0060b0" stop-opacity="0.65"/>
          <stop offset="100%" stop-color="#001428" stop-opacity="0.98"/>
        </linearGradient>
        <linearGradient id="iceSmall" x1="20%" y1="0%" x2="80%" y2="100%">
          <stop offset="0%" stop-color="#d0f0ff" stop-opacity="0.7"/>
          <stop offset="40%" stop-color="#50b8e8" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#002060" stop-opacity="0.9"/>
        </linearGradient>
        <!-- Internal refraction glow -->
        <radialGradient id="refractL" cx="60%" cy="30%" r="50%">
          <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#0040a0" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="refractR" cx="40%" cy="25%" r="50%">
          <stop offset="0%" stop-color="#80e8ff" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#002080" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="refractC" cx="50%" cy="20%" r="60%">
          <stop offset="0%" stop-color="#c0f0ff" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#001050" stop-opacity="0"/>
        </radialGradient>
        <!-- Snow cap -->
        <linearGradient id="snowL" x1="0%" y1="0%" x2="20%" y2="100%">
          <stop offset="0%" stop-color="#f0faff" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#a0d8f0" stop-opacity="0.4"/>
        </linearGradient>
        <!-- Platform gradient -->
        <linearGradient id="platformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#b0e8ff" stop-opacity="0.6"/>
          <stop offset="30%" stop-color="#50a8d8" stop-opacity="0.5"/>
          <stop offset="70%" stop-color="#0058a8" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#001840" stop-opacity="0.95"/>
        </linearGradient>
        <linearGradient id="platformTop" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e8f8ff" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#80c8e8" stop-opacity="0.5"/>
        </linearGradient>
        <!-- Glow filter -->
        <filter id="iceGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="softGlow">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Clip for occlusion zones (penguins go behind these) -->
        <clipPath id="leftGlacierClip">
          <polygon points="0,500 0,200 80,100 160,60 240,85 290,140 320,210 340,300 360,400 360,500"/>
        </clipPath>
        <clipPath id="rightGlacierClip">
          <polygon points="1400,500 1400,180 1330,90 1250,55 1170,80 1110,145 1080,230 1065,350 1060,500"/>
        </clipPath>
      </defs>

      <!-- ════ LARGE LEFT GLACIER ════ -->
      <!-- Back face / shadow -->
      <polygon points="40,500 20,280 70,180 140,110 200,95 260,120 300,175 330,250 350,350 360,500"
               fill="rgba(0,20,60,0.5)"/>
      <!-- Main body -->
      <polygon points="55,500 30,270 90,165 155,105 215,90 272,118 308,170 338,250 356,360 358,500"
               fill="url(#iceL1)"/>
      <!-- Internal refraction blob -->
      <ellipse cx="170" cy="220" rx="90" ry="120" fill="url(#refractL)"/>
      <!-- Surface crack lines -->
      <polyline points="155,105 170,160 145,210 165,280 150,350"

      <polyline points="215,90 210,150 230,200 215,260 225,310"

      <polyline points="90,165 115,210 100,260 118,320"
                fill="none" stroke="rgba(160,230,255,0.2)" stroke-width="0.6"/>
      <!-- Fracture shards -->
      <polygon points="155,105 215,90 200,140 150,155" fill="rgba(200,245,255,0.15)" stroke="rgba(150,230,255,0.4)" stroke-width="0.7"/>
      <polygon points="200,140 272,118 255,190 195,195" fill="rgba(180,235,255,0.1)" stroke="rgba(130,220,255,0.3)" stroke-width="0.6"/>
      <polygon points="90,165 155,155 145,215 82,220" fill="rgba(160,225,255,0.1)" stroke="rgba(120,215,255,0.25)" stroke-width="0.6"/>
      <!-- Snow cap -->
      <polygon points="90,165 130,125 155,105 215,90 272,118 255,145 200,135 155,148 115,170"
               fill="url(#snowL)" opacity="0.85"/>
      <!-- Edge highlight -->
      <polyline points="30,270 90,165 155,105 215,90"
                fill="none" stroke="rgba(220,248,255,0.55)" stroke-width="1.5"/>
      <!-- Sub-glacier peak left -->
      <polygon points="0,500 0,320 40,240 80,210 130,230 155,290 165,380 170,500"
               fill="url(#iceSmall)" opacity="0.7"/>
      <polyline points="0,320 40,240 80,210 130,230"
                fill="none" stroke="rgba(200,245,255,0.4)" stroke-width="1"/>
      <polygon points="40,240 80,210 72,250 38,260" fill="rgba(220,248,255,0.15)" stroke="rgba(200,245,255,0.35)" stroke-width="0.6"/>

      <!-- ════ LARGE RIGHT GLACIER ════ -->
      <polygon points="1365,500 1385,260 1330,155 1258,100 1194,85 1132,112 1095,168 1065,250 1045,360 1042,500"
               fill="rgba(0,20,60,0.5)"/>
      <polygon points="1350,500 1372,255 1315,148 1245,95 1182,82 1122,108 1087,163 1058,248 1040,360 1038,500"

      <ellipse cx="1228" cy="215" rx="90" ry="120" fill="url(#refractR)"/>
      <polyline points="1245,95 1235,155 1252,205 1238,265 1250,320"
                fill="none" stroke="rgba(180,240,255,0.35)" stroke-width="1"/>
      <polyline points="1182,82 1185,148 1165,200 1180,265 1168,318"
                fill="none" stroke="rgba(200,245,255,0.25)" stroke-width="0.7"/>
      <polygon points="1182,82 1245,95 1228,145 1170,148" fill="rgba(200,245,255,0.14)" stroke="rgba(150,230,255,0.38)" stroke-width="0.7"/>
      <polygon points="1228,145 1315,148 1295,195 1225,198" fill="rgba(180,235,255,0.1)" stroke="rgba(130,220,255,0.28)" stroke-width="0.6"/>
      <polygon points="1245,95 1315,148 1295,150 1228,145" fill="rgba(220,248,255,0.12)" stroke="rgba(180,240,255,0.3)" stroke-width="0.5"/>
      <polygon points="1087,163 1122,108 1182,82 1245,95 1228,140 1170,148 1120,140 1092,178"
               fill="url(#snowL)" opacity="0.82"/>
      <polyline points="1372,255 1315,148 1245,95 1182,82"
                fill="none" stroke="rgba(220,248,255,0.5)" stroke-width="1.5"/>
      <polygon points="1400,500 1400,310 1362,228 1322,200 1270,218 1248,280 1240,370 1238,500"
               fill="url(#iceSmall)" opacity="0.68"/>
      <polyline points="1400,310 1362,228 1322,200 1270,218"
                fill="none" stroke="rgba(200,245,255,0.38)" stroke-width="1"/>

      <!-- ════ CENTER PLATFORM (textured) ════ -->
      <!-- Main platform body -->
      <polygon points="520,500 495,420 510,370 545,330 600,315 700,308 760,310 820,315 860,328 885,368 895,420 890,500"

      <!-- Internal refraction -->

      <!-- Crack texture lines on platform -->

      <polygon points="855,362 860,328 878,345 870,365" fill="rgba(245,252,255,0.55)"/>

      <!-- Edge glow rim on platform -->
      <polyline points="510,370 545,330 600,315 700,308 800,313 860,328 885,368"
                fill="none" stroke="rgba(200,246,255,0.6)" stroke-width="1.5"/>

      <!-- ════ SIDE MINI ICEBERGS CENTER ════ -->
      <!-- Left-center mini -->
      <polygon points="430,500 415,400 428,348 455,310 490,302 520,318 535,365 540,430 540,500"
               fill="url(#iceSmall)" opacity="0.75"/>
      <polyline points="415,400 428,348 455,310 490,302 520,318" fill="none" stroke="rgba(200,245,255,0.4)" stroke-width="1"/>

<script>
(function() {
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // ── BACKGROUND CANVAS: stars + nebula ──────────────────────────────────────
  const bgC = document.getElementById('bg-canvas');
  const bgCtx = bgC.getContext('2d');
  let stars = [];

  function resizeBg() {
    bgC.width = W(); bgC.height = H();
    buildStars();
    drawBg();
  }

  function buildStars() {
    stars = [];
    const count = Math.floor(W() * H() / 1400);
    for (let i = 0; i < count; i++) {
      const r = Math.random();
      stars.push({
        x: Math.random() * W(),
        y: Math.random() * H() * 0.75,
        size: r < 0.7 ? Math.random() * 0.8 + 0.2 : Math.random() * 1.6 + 0.8,
        bright: r < 0.15,
        twinkleSpeed: 0.008 + Math.random() * 0.02,
        twinkleOffset: Math.random() * Math.PI * 2,
        alpha: 0.3 + Math.random() * 0.7
      });
    }
  }

  let bgT = 0;
  function drawBg() {
    bgT += 0.012;
    const ctx = bgCtx;
    ctx.clearRect(0, 0, W(), H());

    // Deep space gradient
    const bg = ctx.createLinearGradient(0, 0, 0, H());
    bg.addColorStop(0, '#000810');
    bg.addColorStop(0.3, '#010f22');
    bg.addColorStop(0.65, '#021530');
    bg.addColorStop(1, '#010c1c');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W(), H());

    // Nebula blobs
    const nebs = [
      { x: W()*0.18, y: H()*0.2, rx: W()*0.22, ry: H()*0.18, c: [0,50,120], a: 0.13 },
      { x: W()*0.82, y: H()*0.15, rx: W()*0.18, ry: H()*0.14, c: [0,80,160], a: 0.1 },
      { x: W()*0.5,  y: H()*0.08, rx: W()*0.3,  ry: H()*0.12, c: [0,40,100], a: 0.08 },
    ];
    nebs.forEach(n => {
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, Math.max(n.rx, n.ry));
      const pulse = Math.sin(bgT * 0.5) * 0.03;
      g.addColorStop(0, `rgba(${n.c[0]},${n.c[1]},${n.c[2]},${n.a + pulse})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save();
      ctx.scale(n.rx / Math.max(n.rx, n.ry), n.ry / Math.max(n.rx, n.ry));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x / (n.rx / Math.max(n.rx, n.ry)), n.y / (n.ry / Math.max(n.rx, n.ry)), Math.max(n.rx, n.ry), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Stars
    stars.forEach(s => {
      const flicker = Math.sin(bgT * s.twinkleSpeed * 60 + s.twinkleOffset);
      const a = s.bright ? (s.alpha * (0.6 + 0.4 * flicker)) : (s.alpha * (0.85 + 0.15 * flicker));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      if (s.bright) {
        ctx.shadowBlur = 6;
        ctx.shadowColor = `rgba(180,240,255,${a * 0.8})`;
      }
      ctx.fillStyle = s.bright ? `rgba(200,245,255,${a})` : `rgba(180,230,255,${a})`;
      ctx.fill();
      ctx.shadowBlur = 0;
      // Tiny cross on bright stars
      if (s.bright && s.size > 1.2) {
        ctx.strokeStyle = `rgba(200,245,255,${a * 0.4})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(s.x - s.size * 2.5, s.y);
        ctx.lineTo(s.x + s.size * 2.5, s.y);
        ctx.moveTo(s.x, s.y - s.size * 2.5);
        ctx.lineTo(s.x, s.y + s.size * 2.5);
        ctx.stroke();
      }
    });

    // Atmospheric snow/stardust particles
    ctx.save();
    for (let i = 0; i < 60; i++) {
      const px = ((i * 137.508 + bgT * 8) % W());
      const py = ((i * 73.2 + bgT * (3 + i % 4)) % (H() * 0.85));
      const pa = 0.15 + 0.12 * Math.sin(bgT + i);
      ctx.fillStyle = `rgba(180,235,255,${pa})`;
      ctx.beginPath();
      ctx.arc(px, py, 0.7 + (i % 3) * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    requestAnimationFrame(drawBg);
  }

  // ── PENGUIN PATHS & TRAILS ──────────────────────────────────────────────────
  const trailC = document.getElementById('trail-canvas');
  const tCtx = trailC.getContext('2d');
  const penC = document.getElementById('penguin-canvas');
  const pCtx = penC.getContext('2d');

  function resizeCanvases() {
    trailC.width = penC.width = W();
    trailC.height = penC.height = H();
  }

  // Trail point storage (circular buffer-ish)
  const TRAIL_MAX = 280;
  const TRAIL_LIFE = 10000; // ms fade

  // Penguin definitions
  const penguins = [
    // Central large penguin: wide S-curve through center → behind right glacier → loop
    {
      size: 1.22,
      color: '#00c8ff',
      trailColor: [0, 200, 255],
      phase: 0,
      speed: 0.00038,
      trail: [],
      waddleT: 0,
      waddleSpeed: 0.08,
      // Bezier-style waypoint loop
      pathFn: t => {
        const seg = t % 1;
        // 4-segment path: start center, sweep right, behind right berg, come back left
        const segs = [
          // [p0, c1, c2, p1] all relative to W, H
          [[0.48, 0.72], [0.62, 0.78], [0.72, 0.68], [0.78, 0.72]],
          [[0.78, 0.72], [0.88, 0.76], [0.88, 0.8], [0.75, 0.82]],
          [[0.75, 0.82], [0.55, 0.85], [0.38, 0.78], [0.28, 0.74]],
          [[0.28, 0.74], [0.18, 0.70], [0.32, 0.65], [0.48, 0.72]],
        ];
        const si = Math.floor(seg * 4);
        const st = (seg * 4) % 1;
        const [[x0,y0],[cx1,cy1],[cx2,cy2],[x1,y1]] = segs[Math.min(si, 3)];
        const u = 1 - st;
        return {
          x: (u*u*u*x0 + 3*u*u*st*cx1 + 3*u*st*st*cx2 + st*st*st*x1) * W(),
          y: (u*u*u*y0 + 3*u*u*st*cy1 + 3*u*st*st*cy2 + st*st*st*y1) * H()
        };
      },
      // Depth ordering: occluded behind right glacier between 0.18..0.38 of path
      behindRight: t => { const s = t % 1; return s > 0.18 && s < 0.40; },
      behindLeft: () => false,
    },
    // Left penguin: explores left glacier area in figure-8
    {
      size: 0.88,
      color: '#40dfff',
      trailColor: [60, 210, 255],
      phase: 0.3,
      speed: 0.00046,
      trail: [],
      waddleT: 1.2,
      waddleSpeed: 0.1,
      pathFn: t => {
        const seg = t % 1;
        const segs = [
          [[0.22, 0.74], [0.10, 0.79], [0.08, 0.70], [0.15, 0.66]],
          [[0.15, 0.66], [0.24, 0.62], [0.32, 0.68], [0.30, 0.76]],
          [[0.30, 0.76], [0.28, 0.82], [0.18, 0.82], [0.12, 0.78]],
          [[0.12, 0.78], [0.06, 0.74], [0.10, 0.68], [0.22, 0.74]],
        ];
        const si = Math.floor(seg * 4);
        const st = (seg * 4) % 1;
        const [[x0,y0],[cx1,cy1],[cx2,cy2],[x1,y1]] = segs[Math.min(si, 3)];
        const u = 1 - st;
        return {
          x: (u*u*u*x0 + 3*u*u*st*cx1 + 3*u*st*st*cx2 + st*st*st*x1) * W(),
          y: (u*u*u*y0 + 3*u*u*st*cy1 + 3*u*st*st*cy2 + st*st*st*y1) * H()
        };
      },
      behindLeft: t => { const s = t % 1; return s > 0.62 && s < 0.95; },
      behindRight: () => false,
    },
    // Right penguin: swings around right glacier
    {
      size: 0.88,
      color: '#00e5ff',
      trailColor: [0, 230, 255],
      phase: 0.65,
      speed: 0.00042,
      trail: [],
      waddleT: 0.7,
      waddleSpeed: 0.09,
      pathFn: t => {
        const seg = t % 1;
        const segs = [
          [[0.80, 0.74], [0.88, 0.70], [0.93, 0.76], [0.88, 0.80]],
          [[0.88, 0.80], [0.82, 0.84], [0.74, 0.80], [0.72, 0.74]],
          [[0.72, 0.74], [0.70, 0.68], [0.76, 0.64], [0.84, 0.68]],
          [[0.84, 0.68], [0.92, 0.72], [0.88, 0.78], [0.80, 0.74]],
        ];
        const si = Math.floor(seg * 4);
        const st = (seg * 4) % 1;
        const [[x0,y0],[cx1,cy1],[cx2,cy2],[x1,y1]] = segs[Math.min(si, 3)];
        const u = 1 - st;
        return {
          x: (u*u*u*x0 + 3*u*u*st*cx1 + 3*u*st*st*cx2 + st*st*st*x1) * W(),
          y: (u*u*u*y0 + 3*u*u*st*cy1 + 3*u*st*st*cy2 + st*st*st*y1) * H()
        };
      },
      behindRight: t => { const s = t % 1; return s > 0.0 && s < 0.18; },
      behindLeft: () => false,
    },
  ];

  // Draw a single penguin at (x, y, scale, waddleAngle)
  function drawPenguin(ctx, x, y, scale, angle, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(scale, scale);

    const W2 = 24, H2 = 32;
    // Body shadow
    ctx.fillStyle = 'rgba(0,10,25,0.3)';
    ctx.beginPath();
    ctx.ellipse(2, H2 + 4, W2 * 0.6, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body (dark)
    ctx.fillStyle = '#0c1a2a';
    ctx.beginPath();
    ctx.ellipse(0, 8, W2 * 0.55, H2 * 0.52, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly (white/light)
    ctx.fillStyle = '#ddf0ff';
    ctx.beginPath();
    ctx.ellipse(0, 10, W2 * 0.32, H2 * 0.37, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#0c1a2a';
    ctx.beginPath();
    ctx.ellipse(0, -12, W2 * 0.42, W2 * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    [[-7, -14], [7, -14]].forEach(([ex, ey]) => {
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.ellipse(ex, ey, 4.5, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0d2a48';
      ctx.beginPath();
      ctx.ellipse(ex + 0.5, ey + 0.5, 3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eye shine
      ctx.fillStyle = 'rgba(200,240,255,0.7)';
      ctx.beginPath();
      ctx.ellipse(ex - 0.5, ey - 1, 1, 1.2, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Beak
    ctx.fillStyle = '#ff9f20';
    ctx.beginPath();
    ctx.ellipse(0, -6, 5.5, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Flippers
    ctx.fillStyle = '#0c1a2a';
    ctx.save(); ctx.translate(-W2 * 0.5, 4); ctx.rotate(-0.28 + angle * 0.5);
    ctx.beginPath(); ctx.ellipse(0, 0, 7, 16, 0.3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(W2 * 0.5, 4); ctx.rotate(0.28 - angle * 0.5);
    ctx.beginPath(); ctx.ellipse(0, 0, 7, 16, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.restore();

    // Feet
    ctx.fillStyle = '#ff9f20';
    [[-8, H2 * 0.5], [8, H2 * 0.5]].forEach(([fx, fy]) => {
      ctx.save(); ctx.translate(fx, fy); ctx.rotate(fx < 0 ? -0.2 : 0.2);
      ctx.beginPath(); ctx.ellipse(0, 0, 7, 3.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    });

    // Scarf on center penguin (if scale > 1)
    if (scale > 1.1) {
      ctx.strokeStyle = color || '#00d4ff';
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-W2 * 0.4, -4);
      ctx.quadraticCurveTo(0, -2, W2 * 0.4, -4);
      ctx.stroke();
      // Scarf tail
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(W2 * 0.38, -4);
      ctx.lineTo(W2 * 0.42, 4);
      ctx.stroke();
    }

    ctx.restore();
  }

  // Draw trail
  function drawTrails() {
    tCtx.clearRect(0, 0, W(), H());
    const now = Date.now();
    penguins.forEach(p => {
      if (p.trail.length < 2) return;
      for (let i = 1; i < p.trail.length; i++) {
        const pt = p.trail[i];
        const age = now - pt.time;
        if (age > TRAIL_LIFE) continue;
        const alpha = (1 - age / TRAIL_LIFE) * 0.55;
        const prev = p.trail[i - 1];
        const [r, g, b] = p.trailColor;
        tCtx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        tCtx.lineWidth = (2.5 + 1.5 * (1 - age / TRAIL_LIFE)) * p.size;
        tCtx.lineCap = 'round';
        tCtx.shadowBlur = 6;
        tCtx.shadowColor = `rgba(${r},${g},${b},${alpha * 0.6})`;
        tCtx.beginPath();
        tCtx.moveTo(prev.x, prev.y);
        tCtx.lineTo(pt.x, pt.y);
        tCtx.stroke();
      }
      tCtx.shadowBlur = 0;
    });
  }

  let lastTime = 0;
  function animate(ts) {
    const dt = Math.min(ts - lastTime, 40);
    lastTime = ts;
    const now = Date.now();

    pCtx.clearRect(0, 0, W(), H());

    penguins.forEach(p => {
      p.phase = (p.phase + p.speed * dt) % 1;
      p.waddleT += p.waddleSpeed * dt * 0.05;
      const pos = p.pathFn(p.phase);
      const wangle = Math.sin(p.waddleT) * 0.22;

      // Prune old trail points
      while (p.trail.length > TRAIL_MAX) p.trail.shift();
      const cutoff = now - TRAIL_LIFE - 500;
      while (p.trail.length > 0 && p.trail[0].time < cutoff) p.trail.shift();

      // Add new trail point
      p.trail.push({ x: pos.x, y: pos.y, time: now });

      const isBehindRight = p.behindRight(p.phase);
      const isBehindLeft = p.behindLeft(p.phase);
      const isHidden = isBehindRight || isBehindLeft;

      if (!isHidden) {
        drawPenguin(pCtx, pos.x, pos.y, p.size, wangle, p.color);
      }
    });

    drawTrails();

    requestAnimationFrame(animate);
  }

  // Init
  window.addEventListener('resize', () => { resizeBg(); resizeCanvases(); });
  resizeBg();
  resizeCanvases();
  requestAnimationFrame(ts => { lastTime = ts; animate(ts); });
})();
</script>
</body>
</html>
